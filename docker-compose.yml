services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: darkweb_monitoring
      POSTGRES_USER: darkweb
      POSTGRES_PASSWORD: darkweb_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: postgresql+psycopg://darkweb:darkweb_dev_password@db:5432/darkweb_monitoring
    depends_on:
      - db

volumes:
  postgres_data:
